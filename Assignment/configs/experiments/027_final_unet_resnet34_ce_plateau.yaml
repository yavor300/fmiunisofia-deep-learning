training:
  epochs: 30
  batch_size: 4
  num_workers: 8
  mixed_precision: true
  progress_bar: true

scheduler:
  name: reduce_on_plateau
  mode: max
  factor: 0.5
  patience: 3
  threshold: 0.0001
  min_lr: 0.000001

model:
  architecture: unet
  encoder_name: resnet34
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 19

loss:
  name: cross_entropy

preprocessing:
  resize_height: 512
  resize_width: 1024
  crop_height: 512
  crop_width: 512
  augmentations: basic_aug
  eval_augmentations: resize_only
  normalize: imagenet
