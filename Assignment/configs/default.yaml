seed: 42
project_name: cityscapes-semantic-segmentation

paths:
  data_root: data/raw/cityscapes
  output_dir: outputs
  reports_dir: reports

eda:
  max_samples_per_split: 50

training:
  epochs: 30
  batch_size: 4
  num_workers: 4
  pin_memory: true
  shuffle: true
  mixed_precision: true
  device: cuda
  gradient_clip_norm: 1.0
  early_stopping_patience: null

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: cosine_annealing
  step_size: 10
  gamma: 0.1
  t_max: 30
  eta_min: 0.000001

model:
  architecture: unet
  encoder_name: resnet34
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 19

loss:
  name: cross_entropy
  ignore_index: 255
  class_weights: null

preprocessing:
  resize_height: 512
  resize_width: 1024
  crop_height: 512
  crop_width: 512
  normalize: imagenet
  augmentations: basic

metrics:
  main_metric: mean_iou
  include:
    - mean_iou
    - mean_dice
    - pixel_accuracy
